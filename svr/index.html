<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>KJ7DTS Server · Holden Portal</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="/portal-auth.js"></script>
<style>
:root{--bg:#0d1117;--card:#161b22;--ln:#30363d;--tx:#c9d1d9;--dim:#8b949e;--ok:#3fb950;--warn:#d29922;--bad:#f85149;--blue:#58a6ff}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--tx);font-family:system-ui,Segoe UI,Roboto,sans-serif}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
header{padding:14px 18px;background:var(--card);border-bottom:1px solid var(--ln);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
header h1{margin:0;font-size:18px}.sub{color:var(--dim);font-size:13px}
.wrap{padding:16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--ln);border-radius:10px;padding:14px}
.card .lbl{color:var(--dim);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
.card .big{font-size:26px;font-weight:700;margin-top:6px}.card .sm{color:var(--dim);font-size:12px;margin-top:3px}
.bar{height:6px;background:#21262d;border-radius:3px;margin-top:9px;overflow:hidden}.bar>div{height:100%;border-radius:3px}
.panel{margin:0 16px 16px;background:var(--card);border:1px solid var(--ln);border-radius:10px;padding:14px}
.panel h2{margin:0 0 8px;font-size:13px;color:var(--dim);text-transform:uppercase;letter-spacing:.04em}
.svc{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--ln);font-size:14px}
.svc:last-child{border-bottom:none}.led{width:10px;height:10px;border-radius:50%;flex:none}.up{background:var(--ok)}.down{background:var(--bad)}
.banner{margin:16px;padding:12px 16px;border-radius:10px;font-weight:600}
.foot{padding:4px 18px 26px;color:var(--dim);font-size:12px}
</style></head><body>
<header>
  <div><h1>🖥️ KJ7DTS Server</h1><div class="sub" id="sub">loading…</div></div>
  <div class="sub"><a href="/aprs/">APRS</a> · <a href="#" onclick="firebase.auth().signOut().then(()=>location.reload());return false">sign out</a> · <a href="/">Portal</a></div>
</header>
<div id="banner"></div>
<div class="wrap" id="cards"></div>
<div class="panel"><h2>Services</h2><div id="services"></div></div>
<div class="foot" id="foot">connecting…</div>
<script>
function col(pct){return pct<70?'var(--ok)':pct<90?'var(--warn)':'var(--bad)';}
function card(lbl,big,sm,pct){
  const bar = (pct!=null) ? '<div class="bar"><div style="width:'+Math.min(100,Math.max(0,pct))+'%;background:'+col(pct)+'"></div></div>' : '';
  return '<div class="card"><div class="lbl">'+lbl+'</div><div class="big">'+big+'</div><div class="sm">'+(sm||'')+'</div>'+bar+'</div>';
}
function render(d){
  if(!d){document.getElementById('foot').textContent='waiting for data…';return;}
  const st=d.status||{}, sy=st.system||{}, sv=st.services||{}, h=d.health||{};
  document.getElementById('sub').textContent=(sy.hostname||'kj7dts')+' · up '+(sy.uptime||'?')+' · '+(sy.cores||'?')+' cores';
  const down=h.down||[], b=document.getElementById('banner');
  if(h.all_ok===false||down.length) b.innerHTML='<div class="banner" style="background:#3d1418;border:1px solid var(--bad);color:#ffb3b0">⚠️ '+down.length+' service(s) DOWN: '+down.join(', ')+'</div>';
  else b.innerHTML='<div class="banner" style="background:#11281a;border:1px solid var(--ok);color:#7ee2a8">✅ All systems healthy</div>';
  const mem=sy.mem||{}, disk=sy.disk||{};
  let c='';
  c+=card('CPU load',(sy.cpu_pct??'?')+'%','load '+((sy.load||[]).join(' / ')),sy.cpu_pct);
  c+=card('Memory',(mem.pct??'?')+'%',(mem.used_gb??'?')+' / '+(mem.total_gb??'?')+' GB',mem.pct);
  c+=card('Disk',(disk.pct??'?')+'%',(disk.used_gb??'?')+' / '+(disk.total_gb??'?')+' GB',disk.pct);
  c+=card('CPU temp',(sy.cpu_temp_c!=null?sy.cpu_temp_c+'°C':'n/a'),'',sy.cpu_temp_c);
  c+=card('Uptime',sy.uptime||'?','since boot');
  if(st.wx&&st.wx.ok!==false&&st.wx.temp_f!=null) c+=card('🌡️ Weather',st.wx.temp_f+'°F','HoldenWX live');
  document.getElementById('cards').innerHTML=c;
  const names=Object.keys(sv);
  document.getElementById('services').innerHTML=names.length
    ? names.map(n=>'<div class="svc"><span class="led '+(sv[n]==='active'?'up':'down')+'"></span>'+n+' · '+sv[n]+'</div>').join('')
    : '<div class="sub">no service data</div>';
  document.getElementById('foot').textContent='Updated '+new Date().toLocaleString()
    +' · health checked '+(h.checked?new Date(h.checked).toLocaleTimeString():'—')+' · refreshes ~20s';
}
const db=firebase.app().database('https://holden-portal-default-rtdb.firebaseio.com');
db.ref('aprs/svr').on('value',s=>{try{render(s.val());}catch(e){document.getElementById('foot').textContent='err: '+e;}});
</script></body></html>
