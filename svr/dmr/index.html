<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DMR Hotspot · KJ7DTS</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="/portal-auth.js"></script>
<style>
:root{--bg:#0d1117;--card:#161b22;--ln:#30363d;--tx:#c9d1d9;--dim:#8b949e;--ok:#3fb950;--warn:#d29922;--bad:#f85149;--blue:#58a6ff;--live:#ff4136}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--tx);font-family:system-ui,Segoe UI,Roboto,sans-serif}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
header{padding:14px 18px;background:var(--card);border-bottom:1px solid var(--ln);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
header h1{margin:0;font-size:18px}.sub{color:var(--dim);font-size:13px}
.wrap{max-width:760px;margin:0 auto;padding:16px}
.statuspill{display:inline-block;font-size:12px;font-weight:700;padding:3px 12px;border-radius:14px;letter-spacing:.03em}
.statuspill.live{background:#2a1416;color:#ffb3b0;border:1px solid var(--live)}
.statuspill.idle{background:#11281a;color:#7ee2a8;border:1px solid var(--ok)}
.statuspill.off{background:#3d1418;color:#ffb3b0;border:1px solid var(--bad)}
.filterbar{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:12px}
.filterbar select{background:#0d1117;color:var(--tx);border:1px solid var(--ln);border-radius:8px;padding:6px 11px;font-size:13px;cursor:pointer;max-width:70%}
.hero{background:var(--card);border:1px solid var(--ln);border-radius:14px;padding:28px 22px;text-align:center;margin-bottom:14px;transition:border-color .2s,background .2s}
.hero.on{border-color:var(--live);background:#1c1315}
.hero .eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:8px}
.hero.on .eyebrow{color:var(--live)}
.hero .call{font-size:42px;font-weight:800;line-height:1.05;letter-spacing:-.01em}
.hero .who{font-size:16px;color:var(--dim);margin-top:4px}
.hero .tg{display:inline-block;margin-top:14px;font-size:15px;background:#1a2230;border:1px solid var(--ln);color:var(--blue);border-radius:10px;padding:5px 14px;font-weight:600}
.hero.on .tg{background:#2a1416;border-color:var(--live);color:#ffd0cd}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;vertical-align:middle;margin-right:6px}
.dot.live{background:var(--live);animation:pulse 1.1s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,65,54,.55)}70%{box-shadow:0 0 0 9px rgba(255,65,54,0)}100%{box-shadow:0 0 0 0 rgba(255,65,54,0)}}
.chip{display:inline-block;background:#21262d;border:1px solid var(--ln);border-radius:12px;padding:3px 12px;margin:0 5px 6px 0;font-size:13px;color:var(--blue)}
.nets{text-align:center;margin-bottom:16px}
.tbl{width:100%;border-collapse:collapse;font-size:14px;background:var(--card);border:1px solid var(--ln);border-radius:12px;overflow:hidden}
.tbl th{text-align:left;color:var(--dim);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:9px 12px;border-bottom:1px solid var(--ln);background:#12161c}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--ln)}.tbl tr:last-child td{border-bottom:none}
.tbl tr.now td{background:#241012}.tbl tr.now td:first-child{box-shadow:inset 3px 0 0 var(--live)}
.tbl .t{color:var(--dim);font-variant-numeric:tabular-nums;white-space:nowrap}
.tbl .nm{color:var(--dim);font-size:13px}
.tbl .loc{color:var(--dim);font-size:12px;margin-top:1px}
.foot{text-align:center;color:var(--dim);font-size:12px;margin-top:14px;line-height:1.6}
@media(max-width:520px){.hero .call{font-size:34px}.wrap{padding:12px}}
</style></head><body>
<header>
  <div><h1>📻 KJ7DTS DMR Hotspot</h1><div class="sub" id="sub">connecting…</div></div>
  <div class="sub"><a href="/svr/">← Server</a> · <a href="/">Portal</a></div>
</header>
<div class="wrap">
  <div class="filterbar" id="filterbar" style="display:none">
    <label class="sub" for="tgFilter">Monitor:</label>
    <select id="tgFilter"><option value="__ALL__">All talkgroups</option></select>
  </div>
  <div class="hero" id="hero"><div class="eyebrow">DMR Monitor</div><div class="call">…</div></div>
  <div class="nets" id="nets"></div>
  <div id="tblWrap"></div>
  <div class="foot" id="foot">Live from your hotspot's last-heard, ~5&nbsp;sec. Times are the hotspot clock (UTC).</div>
</div>
<script>
var ALL='__ALL__';
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function arr(v){return Array.isArray(v)?v:(v?Object.values(v):[]);}
function tgKey(r){return r.tgname||r.tg||'';}
function selectedTg(){return localStorage.getItem('dmrTg')||ALL;}
function tgLabel(r){
  if(r.tgname) return '<b>'+esc(r.tgname)+'</b> <span class="nm">'+esc(String(r.tg||'').replace(/^TG\s*/,''))+'</span>';
  return esc(r.tg||r.tgt||'');
}
var seen={}, sig='';
function buildFilter(allLh){
  allLh.forEach(function(r){var k=tgKey(r);if(k)seen[k]=true;});
  var cur=selectedTg();
  if(cur!==ALL) seen[cur]=true;                       // keep the chosen TG selectable with no current activity
  var keys=Object.keys(seen).sort();
  var bar=document.getElementById('filterbar'), sel=document.getElementById('tgFilter');
  if(!keys.length){bar.style.display='none';return;}
  bar.style.display='flex';
  var newsig=keys.join('|');
  if(newsig!==sig){                                   // rebuild options only when the set changes (no flicker)
    sig=newsig;
    sel.innerHTML='<option value="'+ALL+'">All talkgroups</option>'
      +keys.map(function(k){return '<option value="'+esc(k)+'">'+esc(k)+'</option>';}).join('');
  }
  sel.value=cur;
}
function render(dmr){
  dmr=dmr||{};
  var sub=document.getElementById('sub'), hero=document.getElementById('hero'),
      nets=document.getElementById('nets'), tblWrap=document.getElementById('tblWrap');
  if(dmr.online===false){
    sub.innerHTML='<span class="statuspill off">offline</span>';
    hero.className='hero';
    hero.innerHTML='<div class="eyebrow">DMR Monitor</div><div class="call" style="font-size:30px">Hotspot offline</div><div class="who" style="margin-top:8px">WiFi drop or powered off</div>';
    nets.innerHTML=''; tblWrap.innerHTML=''; return;
  }
  if(!dmr.online){ sub.innerHTML='<span class="statuspill idle">…</span>'; return; }
  var allLh=arr(dmr.lh), allNets=arr(dmr.nets);
  buildFilter(allLh);                                 // dropdown from the FULL list, before filtering
  var cur=selectedTg();
  var lh = cur===ALL ? allLh : allLh.filter(function(r){return tgKey(r)===cur;});
  var now = (dmr.now && (cur===ALL || tgKey(dmr.now)===cur)) ? dmr.now : null;
  var filtered = cur!==ALL;
  sub.innerHTML=now?'<span class="statuspill live"><span class="dot live"></span>ON AIR</span>'
                   :'<span class="statuspill idle">listening</span>';
  if(now){
    hero.className='hero on';
    hero.innerHTML='<div class="eyebrow">🔴 On air now</div>'
      +'<div class="call">'+esc(now.call||'?')+'</div>'
      +(now.name?'<div class="who">'+esc(now.name)+'</div>':'')
      +(now.loc?'<div class="who" style="font-size:14px;margin-top:2px">'+esc(now.loc)+'</div>':'')
      +'<div class="tg">'+(now.tgname?esc(now.tgname):esc(now.tg||''))+'</div>';
  } else {
    hero.className='hero';
    var last=lh[0];
    hero.innerHTML='<div class="eyebrow">DMR Monitor</div>'
      +'<div class="call" style="font-size:30px;color:var(--dim)">Listening…</div>'
      +(last?'<div class="who" style="margin-top:10px">last heard <b style="color:var(--tx)">'+esc(last.call||'?')+'</b>'
            +(last.name?' ('+esc(last.name)+')':'')+' on '+(last.tgname?esc(last.tgname):esc(last.tg||''))
            +' <span class="nm">@ '+esc(last.t||'')+'</span></div>'
           :'<div class="who" style="margin-top:10px">no recent activity'+(filtered?' on '+esc(cur):'')+'</div>');
  }
  nets.innerHTML=allNets.map(function(n){return '<span class="chip">'+esc(n)+'</span>';}).join('');
  if(lh.length){
    var rows=lh.map(function(r){return '<tr'+(r.now?' class="now"':'')+'><td class="t">'+esc(r.t||'')+'</td>'
      +'<td><b>'+esc(r.call||'?')+'</b>'+(r.name?' <span class="nm">'+esc(r.name)+'</span>':'')
        +(r.loc?'<div class="loc">'+esc(r.loc)+'</div>':'')+'</td>'
      +'<td>'+tgLabel(r)+'</td></tr>';}).join('');
    tblWrap.innerHTML='<table class="tbl"><thead><tr><th>Time</th><th>Station</th><th>Talkgroup</th></tr></thead><tbody>'+rows+'</tbody></table>';
  } else {
    tblWrap.innerHTML='<div class="sub" style="text-align:center;padding:20px">no recent activity'+(filtered?' on '+esc(cur):'')+'</div>';
  }
}
document.getElementById('tgFilter').addEventListener('change',function(){
  localStorage.setItem('dmrTg',this.value);
  if(window.lastDmr) try{render(window.lastDmr);}catch(e){}
});
var db=firebase.app().database('https://holden-portal-default-rtdb.firebaseio.com');
db.ref('aprs/svr/dmr').on('value',function(s){
  window.lastDmr=s.val();
  try{render(window.lastDmr);}catch(e){document.getElementById('foot').textContent='err: '+e;}
});
</script>
</body></html>
