<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="/portal-auth.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Weather - Holden Portal">
    <meta name="author" content="Holden">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://apis.google.com https://securetoken.googleapis.com https://identitytoolkit.googleapis.com; frame-src https://script.google.com https://accounts.google.com;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Weather - Holden Portal</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .webapp-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .webapp-iframe {
            flex: 1;
            width: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <h1>Holden Portal</h1>
                </div>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/weather">Weather</a></li>
                    <li><a href="/weathercorb">Corbett Weather</a></li>
                    <li><a href="/orfireems">Oregon Fire/EMS CAD</a></li>
                    <li><a href="/home-dashboard">Dashboard</a></li>
                    <li class="nav-item">
                        <a href="#" onclick="return false;">Projects ▾</a>
                        <ul class="dropdown">
                            <li><a href="/hoscad">HOSCAD</a></li>
                            <li><a href="/hoscadfield">HOSCAD Field</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="webapp-container">
        <iframe
            class="webapp-iframe"
            src="https://script.google.com/macros/s/AKfycbziArpKFV51Ly4XGss6tk1KsLuAE5ODGJhjKUKqQ-BLTH29wJJPMwVtrMll-Ta6MTStPQ/exec"
            sandbox="allow-same-origin allow-scripts allow-forms allow-popups"
            allow="geolocation">
        </iframe>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Holden Portal. All rights reserved.</p>
        </div>
    </footer>
    <script>
        document.querySelectorAll('.nav-item > a').forEach(function(el) {
            el.addEventListener('click', function() {
                this.closest('.nav-item').classList.toggle('open');
            });
        });
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.nav-item')) {
                document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('open'); });
            }
        });
    </script>
</body>
</html>
