<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oregon Fire/EMS CAD</title>
    <!-- Leaflet + markercluster loaded non-blocking (media/defer): a CDN stall must
         never blank the board. Map code guards on typeof L / L.markerClusterGroup. -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
          media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css"
          media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.min.css"
          media="print" onload="this.media='all'" />
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            background: #0a0a12;
            color: #e0e0e0;
            font-size: 13px;
        }

        /* Dashboard */
        .dashboard { display: block; }

        .header {
            background: linear-gradient(90deg, #1a1a2e 0%, #16213e 100%);
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #c41e3a;
            flex-wrap: wrap; gap: 8px;
        }
        .header h1 { font-size: 1.3em; color: #ff6b6b; font-weight: bold; }
        .header-stats { display: flex; gap: 20px; }
        .header-stat { text-align: center; }
        .header-stat-value { font-size: 1.4em; font-weight: bold; color: #4ecdc4; }
        .header-stat-label { font-size: 0.75em; opacity: 0.75; }
        .live-indicator { display: flex; align-items: center; gap: 6px; font-size: 0.85em; }
        .live-dot {
            width: 8px; height: 8px; background: #27ae60;
            border-radius: 50%; animation: pulse 1.5s infinite;
        }
        .live-dot.stale { background: #f39c12; }
        .live-dot.error { background: #c0392b; animation: none; }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.9); }
        }

        .controls {
            background: #12121f;
            padding: 8px 15px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            border-bottom: 1px solid #2a2a4a;
            flex-wrap: wrap;
            gap: 10px;
        }
        .control-sep { width: 1px; align-self: stretch; background: #2a2a4a; margin: 0 2px; }
        .view-toggle { display: flex; gap: 5px; }
        .view-btn {
            padding: 5px 12px; background: #1a1a2e;
            border: 1px solid #3a3a5a; color: #c3c3d0;
            cursor: pointer; font-size: 0.85em; font-family: inherit;
        }
        .view-btn.active { background: #c41e3a; border-color: #c41e3a; color: white; }
        .view-btn:hover:not(.active) { background: #2a2a4a; }
        .filter-toggle {
            padding: 5px 12px; background: #1a1a2e;
            border: 1px solid #3a3a5a; color: #c3c3d0;
            cursor: pointer; font-size: 0.85em; font-family: inherit;
            margin-left: auto;
        }
        .filter-toggle:hover { background: #2a2a4a; }

        .filter-panel {
            background: #0f0f1a; padding: 10px 15px;
            border-bottom: 1px solid #2a2a4a; display: none;
        }
        .filter-panel.show { display: block; }
        .filter-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 6px;
        }
        .filter-title { font-weight: bold; color: #4ecdc4; }
        .filter-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-btn {
            padding: 3px 8px; background: #2a2a4a;
            border: none; color: #c3c3d0; cursor: pointer;
            font-size: 0.8em; font-family: inherit;
        }
        .filter-btn:hover { background: #3a3a5a; color: white; }
        .agency-grid {
            display: flex; flex-direction: column; gap: 3px;
            max-height: 340px; overflow-y: auto;
        }
        /* County groups (collapsible) */
        .county-group { background: #12121f; border: 1px solid #2a2a4a; border-radius: 4px; }
        .county-header {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 10px; cursor: pointer; user-select: none;
        }
        .county-header:hover { background: #1f1f33; }
        .county-header input { cursor: pointer; }
        .county-name { font-weight: bold; color: #4ecdc4; }
        .county-meta { margin-left: auto; display: flex; gap: 8px; align-items: center; font-size: 0.8em; color: #98a2b3; }
        .county-chevron { color: #98a2b3; font-size: 0.8em; transition: transform 0.15s; }
        .county-group.collapsed .county-chevron { transform: rotate(-90deg); }
        .county-group.collapsed .county-agencies { display: none; }
        .county-agencies {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 3px; padding: 2px 8px 8px 8px;
        }
        .county-badge { background: #3a3a5a; padding: 1px 6px; border-radius: 10px; }
        .county-badge.active { background: #c0392b; color: #fff; }
        .agency-item {
            display: flex; align-items: center; gap: 6px;
            padding: 4px 8px; background: #1a1a2e;
            cursor: pointer; font-size: 0.85em;
        }
        .agency-item:hover { background: #2a2a4a; }
        .agency-item input { cursor: pointer; }
        .agency-item.has-active { border-left: 3px solid #ff6b6b; }
        .agency-item.has-recent { border-left: 3px solid #f39c12; }
        .agency-count {
            margin-left: auto; background: #3a3a5a;
            padding: 1px 6px; border-radius: 10px; font-size: 0.8em;
        }

        .cad-container { padding: 10px; }
        .cad-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .cad-table th {
            background: #1a1a2e; padding: 8px 10px; text-align: left;
            font-weight: bold; color: #4ecdc4;
            border-bottom: 2px solid #3a3a5a;
            position: sticky; top: 0; cursor: pointer; white-space: nowrap;
        }
        .cad-table th:hover { background: #2a2a4a; }
        .cad-table td {
            padding: 6px 10px; border-bottom: 1px solid #1a1a2e;
            vertical-align: top;
        }
        .cad-table tr { cursor: pointer; }
        .cad-table tr:hover { background: #16213e; }
        .cad-table tr.recent { opacity: 0.82; }
        .cad-table tr.recent td { font-style: italic; }
        /* "NEW since last refresh" salience (no motion) */
        .cad-table tr.is-new td:first-child { box-shadow: inset 3px 0 0 0 #4ecdc4; }
        .cad-table tr.is-new td { background: rgba(78, 205, 196, 0.06); }

        .status-badge {
            display: inline-block; padding: 2px 6px;
            border-radius: 3px; font-size: 0.85em; font-weight: bold;
        }
        .status-active { background: #27ae60; color: white; }
        .status-recent { background: #7f8c8d; color: white; }

        .call-type { font-weight: bold; padding: 2px 6px; border-radius: 3px; }
        .call-me { background: #16a085; color: white; }
        .call-tc { background: #f39c12; color: white; }
        .call-fire { background: #c0392b; color: white; }
        .call-other { background: #7f8c8d; color: white; }
        .call-desc { color: #98a2b3; font-size: 0.85em; margin-left: 4px; }

        .units-cell { display: flex; flex-wrap: wrap; gap: 3px; }
        .unit-badge { padding: 2px 5px; border-radius: 3px; font-size: 0.85em; font-weight: 500; }
        .unit-orange { background: #e67e22; color: white; }
        .unit-green { background: #27ae60; color: white; }
        .unit-red { background: #c0392b; color: white; }
        .unit-yellow { background: #f1c40f; color: #333; }
        .unit-blue { background: #3498db; color: white; }
        .unit-gray { background: #5a5a6a; color: white; }

        .time-cell { white-space: nowrap; }
        .time-ago { font-size: 0.85em; color: #98a2b3; }
        .no-incidents { text-align: center; padding: 40px; color: #8a92a0; font-size: 1.1em; }
        .footer {
            text-align: center; padding: 8px; color: #8a92a0;
            font-size: 0.85em; border-top: 1px solid #1a1a2e;
        }

        /* Full-board map view */
        #board-map {
            display: none; width: 100%;
            height: calc(100vh - 160px); min-height: 380px;
            border: 1px solid #2a2a4a; border-radius: 6px; background: #0f0f1a;
        }
        #board-map .leaflet-container { background: #0f0f1a; }
        #map-note { display: none; padding: 5px 4px 0; color: #98a2b3; font-size: 0.8em; }
        /* Incident markers on the board map (divIcon dots, color = call class) */
        .inc-dot {
            display: block; width: 14px; height: 14px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.55); box-sizing: border-box;
        }
        .inc-me { background: #16a085; }
        .inc-tc { background: #f39c12; }
        .inc-fire { background: #c0392b; }
        .inc-other { background: #7f8c8d; }
        .inc-active { width: 17px; height: 17px; border-color: #fff; box-shadow: 0 0 0 3px rgba(255,107,107,0.55); }

        /* Clickable address / coordinate links -> open in Google Maps */
        .addr-link { color: #5dade2; text-decoration: none; }
        .addr-link:hover { color: #85c1e9; text-decoration: underline; }
        .addr-link .pin { opacity: 0.7; margin-left: 3px; font-size: 0.9em; }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); display: none;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #1a1a2e; border: 2px solid #c41e3a;
            border-radius: 10px; width: 90%; max-width: 600px;
            max-height: 80vh; overflow-y: auto;
        }
        .modal-header {
            background: #c41e3a; padding: 12px 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-title { font-weight: bold; font-size: 1.1em; }
        .modal-close {
            background: none; border: none; color: white;
            font-size: 1.5em; cursor: pointer; line-height: 1;
        }
        .modal-body { padding: 15px; }
        .detail-row { display: flex; padding: 8px 0; border-bottom: 1px solid #2a2a4a; }
        .detail-label { width: 120px; color: #4ecdc4; font-weight: bold; flex-shrink: 0; }
        .detail-value { flex: 1; }
        .detail-units { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .detail-unit { padding: 5px 10px; border-radius: 5px; font-size: 0.9em; }
        .detail-unit-info { font-size: 0.8em; opacity: 0.8; }
        /* Inline Leaflet map inside the detail modal */
        .detail-map {
            height: 240px; width: 100%; margin-top: 12px;
            border-radius: 6px; border: 1px solid #2a2a4a;
            background: #0f0f1a;
            overscroll-behavior: contain;
        }
        .detail-map .leaflet-container { background: #0f0f1a; }
        .map-actions { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .map-link {
            display: inline-block; padding: 8px 15px;
            background: #3498db; color: white; text-decoration: none; border-radius: 5px;
        }
        .map-link:hover { background: #2980b9; }
        .map-link.osm { background: #5a7d2a; }
        .map-link.osm:hover { background: #6b9433; }

        /* Mobile: collapse the 6-column table into stacked cards */
        @media (max-width: 640px) {
            .header { justify-content: center; }
            .header h1 { font-size: 1.05em; width: 100%; text-align: center; }
            .header-stats { gap: 14px; }
            .cad-container { padding: 6px; }
            .cad-table thead { display: none; }
            .cad-table, .cad-table tbody, .cad-table tr, .cad-table td { display: block; width: 100%; }
            .cad-table tr {
                border: 1px solid #2a2a4a; border-radius: 6px;
                margin-bottom: 6px; padding: 4px 8px; background: #12121f;
            }
            .cad-table tr.is-new { border-color: #4ecdc4; }
            .cad-table td { border: none; padding: 3px 2px; display: flex; gap: 8px; }
            .cad-table td::before {
                content: attr(data-label); color: #98a2b3; font-size: 0.8em;
                min-width: 62px; flex-shrink: 0;
            }
            .cad-table tr.is-new td:first-child { box-shadow: none; }
            .units-cell { flex-wrap: wrap; }
            #board-map { height: calc(100vh - 210px); min-height: 300px; }
            .detail-label { width: 92px; }
        }
    </style>
</head>
<body>
    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <div class="header">
            <h1>OREGON FIRE/EMS CAD</h1>
            <div class="header-stats">
                <div class="header-stat">
                    <div class="header-stat-value" id="active-count">0</div>
                    <div class="header-stat-label">ACTIVE</div>
                </div>
                <div class="header-stat">
                    <div class="header-stat-value" id="recent-count">0</div>
                    <div class="header-stat-label">RECENT</div>
                </div>
                <div class="header-stat">
                    <div class="header-stat-value" id="unit-count">0</div>
                    <div class="header-stat-label">UNITS</div>
                </div>
                <div class="header-stat">
                    <div class="header-stat-value" id="agency-count">0</div>
                    <div class="header-stat-label">AGENCIES</div>
                </div>
            </div>
            <div class="live-indicator">
                <span class="live-dot"></span>
                <span id="refresh-status">LIVE</span>
            </div>
        </div>

        <div class="controls">
            <div class="view-toggle">
                <button class="view-btn active" id="btn-table" onclick="setBoardView('table')">TABLE</button>
                <button class="view-btn" id="btn-map" onclick="setBoardView('map')">MAP</button>
            </div>
            <div class="control-sep"></div>
            <div class="view-toggle">
                <button class="view-btn active" id="btn-all" onclick="setView('all')">ALL</button>
                <button class="view-btn" id="btn-active" onclick="setView('active')">ACTIVE ONLY</button>
                <button class="view-btn" id="btn-recent" onclick="setView('recent')">RECENT ONLY</button>
            </div>
            <div class="view-toggle">
                <button class="view-btn active" id="btn-12h" onclick="setTimeFilter('12h')">LAST 12 HRS</button>
                <button class="view-btn" id="btn-24h" onclick="setTimeFilter('24h')">12-24 HRS</button>
                <button class="view-btn" id="btn-alltime" onclick="setTimeFilter('all')">ALL TIME</button>
            </div>
            <button class="filter-toggle" onclick="toggleFilters()">
                FILTER AGENCIES (<span id="filter-count">0</span>/<span id="total-agencies">0</span>)
            </button>
        </div>

        <div class="filter-panel" id="filter-panel">
            <div class="filter-header">
                <span class="filter-title">SELECT AGENCIES TO DISPLAY</span>
                <div class="filter-actions">
                    <button class="filter-btn" onclick="expandAllCounties()">EXPAND ALL</button>
                    <button class="filter-btn" onclick="collapseAllCounties()">COLLAPSE ALL</button>
                    <button class="filter-btn" onclick="selectAll()">SELECT ALL</button>
                    <button class="filter-btn" onclick="selectNone()">SELECT NONE</button>
                </div>
            </div>
            <div class="agency-grid" id="agency-grid"></div>
        </div>

        <div class="cad-container">
            <div id="table-wrap">
                <table class="cad-table">
                    <thead>
                        <tr>
                            <th data-sort="status" data-label="STATUS" onclick="sortBy('status')" style="width: 70px">STATUS</th>
                            <th data-sort="time" data-label="TIME" onclick="sortBy('time')" style="width: 100px">TIME</th>
                            <th data-sort="type" data-label="TYPE" onclick="sortBy('type')" style="width: 90px">TYPE</th>
                            <th data-sort="agency" data-label="AGENCY" onclick="sortBy('agency')">AGENCY</th>
                            <th data-sort="address" data-label="ADDRESS" onclick="sortBy('address')">ADDRESS</th>
                            <th data-label="UNITS">UNITS</th>
                        </tr>
                    </thead>
                    <tbody id="incidents-body"></tbody>
                </table>
                <div class="no-incidents" id="no-incidents" style="display:none">No incidents to display</div>
            </div>
            <div id="board-map"></div>
            <div id="map-note"></div>
        </div>

        <div class="footer">
            <span id="last-update">Loading...</span> | Click an incident for details + map
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span class="modal-title" id="modal-title">Incident Details</span>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        const REFRESH_INTERVAL = 30000; // re-fetch every 30s
        const STALE_MINUTES = 5;        // feed considered stale past this age
        // Always-on Railway scraper (replaces the GitHub Pages feed). Updates ~every 80s.
        const DATA_URL = 'https://orfireems-scraper-production.up.railway.app/pulsepoint_data.json';

        let allData = { active_incidents: [], recent_incidents: [], agencies: {} };
        let knownAgencies = {};
        let selectedAgencies = new Set();
        let currentView = 'all';
        let timeFilter = '12h';
        let sortField = 'time';
        let sortAsc = false;
        let boardView = 'table';        // 'table' | 'map'
        let allIncidentsMap = {};
        let detailMap = null;           // Leaflet map in the detail modal
        let agenciesInitialized = false;
        let lastFetchOk = null;
        let prevAllIds = null;          // incident ids from the previous fetch
        let newIncidentIds = new Set(); // ids that appeared on the latest fetch
        const TIME_BTN = { '12h': 'btn-12h', '24h': 'btn-24h', 'all': 'btn-alltime' };

        const CALL_TYPES_SHORT = {
            'ME': 'MED', 'TC': 'TC', 'VF': 'VEH FIRE', 'SF': 'STR FIRE',
            'VEG': 'VEG FIRE', 'OF': 'OUTSIDE', 'MU': 'MUTUAL', 'FA': 'ALARM',
            'AFA': 'AUTO ALM', 'GAS': 'GAS', 'HAZMAT': 'HAZMAT', 'WR': 'WATER',
            'LA': 'LIFT', 'PS': 'SERVICE', 'INV': 'INVEST'
        };
        const CALL_TYPES_FULL = {
            'ME': 'Medical Emergency', 'TC': 'Traffic Collision', 'VF': 'Vehicle Fire',
            'SF': 'Structure Fire', 'VEG': 'Vegetation Fire', 'OF': 'Outside Fire',
            'MU': 'Mutual Aid', 'FA': 'Fire Alarm', 'AFA': 'Automatic Fire Alarm',
            'GAS': 'Gas Leak', 'HAZMAT': 'Hazardous Materials', 'WR': 'Water Rescue',
            'LA': 'Lift Assist', 'PS': 'Public Service', 'INV': 'Investigation'
        };
        const UNIT_STATUS_FULL = {
            'DP': 'Dispatched', 'ER': 'Enroute', 'OS': 'On Scene',
            'AK': 'Acknowledged', 'TR': 'Transporting', 'TA': 'Transport Arrived',
            'AR': 'Available', 'AQ': 'Available in Quarters', 'ST': 'Staged'
        };

        // ---- state persistence (localStorage + shareable URL) --------------------
        function loadState() {
            const url = new URLSearchParams(location.search);
            let prefs = {};
            try { prefs = JSON.parse(localStorage.getItem('orfireems_prefs') || '{}'); } catch (e) {}
            const pick = (k, def) => url.get(k) || prefs[k] || def;
            currentView = ['all', 'active', 'recent'].includes(pick('view')) ? pick('view') : 'all';
            timeFilter = ['12h', '24h', 'all'].includes(pick('time')) ? pick('time') : '12h';
            sortField = pick('sort', 'time');
            sortAsc = pick('dir', 'desc') === 'asc';
            boardView = pick('board') === 'map' ? 'map' : 'table';
        }

        function saveState() {
            localStorage.setItem('orfireems_agencies', JSON.stringify([...selectedAgencies]));
            const prefs = { view: currentView, time: timeFilter, sort: sortField, dir: sortAsc ? 'asc' : 'desc', board: boardView };
            localStorage.setItem('orfireems_prefs', JSON.stringify(prefs));
            const url = new URLSearchParams();
            Object.entries(prefs).forEach(([k, v]) => url.set(k, v));
            const total = Object.keys(knownAgencies).length;
            if (selectedAgencies.size > 0 && total > 0 && selectedAgencies.size < total) {
                url.set('ag', [...selectedAgencies].join(','));
            }
            history.replaceState(null, '', location.pathname + '?' + url.toString());
        }

        function applyStateToUI() {
            ['all', 'active', 'recent'].forEach(v => document.getElementById('btn-' + v).classList.toggle('active', v === currentView));
            Object.entries(TIME_BTN).forEach(([f, id]) => document.getElementById(id).classList.toggle('active', f === timeFilter));
            document.getElementById('btn-table').classList.toggle('active', boardView === 'table');
            document.getElementById('btn-map').classList.toggle('active', boardView === 'map');
            document.getElementById('table-wrap').style.display = boardView === 'table' ? 'block' : 'none';
            document.getElementById('board-map').style.display = boardView === 'map' ? 'block' : 'none';
            document.getElementById('map-note').style.display = boardView === 'map' ? 'block' : 'none';
        }

        loadState();
        applyStateToUI();
        fetchData();
        setInterval(fetchData, REFRESH_INTERVAL);
        setInterval(updateLiveStatus, REFRESH_INTERVAL); // keep stale/offline indicator fresh between fetches

        // ---- helpers -------------------------------------------------------------
        function escapeHtml(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
                ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        function parseCoords(incident) {
            if (!incident) return null;
            const lat = parseFloat(incident.latitude);
            const lng = parseFloat(incident.longitude);
            if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
            if (lat === 0 && lng === 0) return null;
            if (lat < -90 || lat > 90 || lng < -180 || lng > 180) return null;
            return { lat, lng };
        }

        function gmapsUrl(lat, lng) { return `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`; }
        function osmUrl(lat, lng) { return `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lng}#map=16/${lat}/${lng}`; }

        function getCallClass(type) {
            if (['ME', 'LA'].includes(type)) return 'call-me';
            if (['VF', 'SF', 'VEG', 'OF', 'FA', 'AFA'].includes(type)) return 'call-fire';
            if (['TC'].includes(type)) return 'call-tc';
            return 'call-other';
        }
        function callTypeFull(t) { return CALL_TYPES_FULL[t] || ''; }

        function formatTime(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
        }
        function timeAgo(iso) {
            if (!iso) return '';
            const mins = Math.floor((new Date() - new Date(iso)) / 60000);
            if (mins < 1) return 'now';
            if (mins < 60) return mins + 'm';
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return hrs + 'h';
            return Math.floor(hrs / 24) + 'd';
        }

        // ---- view controls -------------------------------------------------------
        function setView(view) {
            currentView = view;
            ['all', 'active', 'recent'].forEach(v => document.getElementById('btn-' + v).classList.remove('active'));
            document.getElementById('btn-' + view).classList.add('active');
            saveState();
            renderIncidents();
        }
        function setTimeFilter(filter) {
            timeFilter = filter;
            Object.values(TIME_BTN).forEach(id => document.getElementById(id).classList.remove('active'));
            document.getElementById(TIME_BTN[filter]).classList.add('active');
            saveState();
            renderIncidents();
        }
        function setBoardView(mode) {
            boardView = mode;
            applyStateToUI();
            saveState();
            renderIncidents();
            if (mode === 'map') setTimeout(() => { if (boardMap) boardMap.invalidateSize(); }, 60);
        }
        function isWithinTimeRange(isoString) {
            if (!isoString || timeFilter === 'all') return true;
            const hoursAgo = (new Date() - new Date(isoString)) / 3600000;
            if (timeFilter === '12h') return hoursAgo <= 12;
            if (timeFilter === '24h') return hoursAgo > 12 && hoursAgo <= 24;
            return true;
        }
        function toggleFilters() { document.getElementById('filter-panel').classList.toggle('show'); }
        function sortBy(field) {
            if (sortField === field) sortAsc = !sortAsc;
            else { sortField = field; sortAsc = true; }
            saveState();
            renderIncidents();
        }
        function updateSortIndicators() {
            document.querySelectorAll('.cad-table th[data-sort]').forEach(th => {
                const base = th.dataset.label;
                th.textContent = base + (th.dataset.sort === sortField ? (sortAsc ? ' ▲' : ' ▼') : '');
            });
        }

        // ---- agency filter (county-grouped) --------------------------------------
        let expandedCounties = new Set();
        function agenciesByCounty() {
            const groups = {};
            Object.entries(knownAgencies).forEach(([id, info]) => {
                const c = info.county || 'Other';
                (groups[c] = groups[c] || []).push([id, info]);
            });
            return groups;
        }
        function updateAgencyFilters() {
            const grid = document.getElementById('agency-grid');
            const groups = agenciesByCounty();
            const counties = Object.keys(groups).sort();
            grid.innerHTML = counties.map(county => {
                const items = groups[county].sort((a, b) => a[1].name.localeCompare(b[1].name));
                const total = items.length;
                const sel = items.filter(([id]) => selectedAgencies.has(id)).length;
                const activeSum = items.reduce((s, [, i]) => s + (i.activeCount || 0), 0);
                const recentSum = items.reduce((s, [, i]) => s + (i.recentCount || 0), 0);
                const expanded = expandedCounties.has(county);
                const badge = activeSum > 0
                    ? `<span class="county-badge active">${activeSum} active</span>`
                    : (recentSum > 0 ? `<span class="county-badge">${recentSum}</span>` : '');
                const agencyHtml = items.map(([id, info]) => {
                    let cls = 'agency-item';
                    if (info.activeCount > 0) cls += ' has-active';
                    else if (info.recentCount > 0) cls += ' has-recent';
                    const count = info.activeCount + info.recentCount;
                    return `<label class="${cls}">
                        <input type="checkbox" data-agency-id="${escapeHtml(id)}" ${selectedAgencies.has(id) ? 'checked' : ''}>
                        <span>${escapeHtml(info.name)}</span>
                        ${count > 0 ? `<span class="agency-count">${count}</span>` : ''}
                    </label>`;
                }).join('');
                return `<div class="county-group ${expanded ? '' : 'collapsed'}">
                    <div class="county-header" data-county-toggle="${escapeHtml(county)}">
                        <input type="checkbox" data-county="${escapeHtml(county)}" ${sel === total && total > 0 ? 'checked' : ''} title="Select/clear all in ${escapeHtml(county)}">
                        <span class="county-name">${escapeHtml(county)}</span>
                        <span class="county-meta"><span>${sel}/${total}</span>${badge}<span class="county-chevron">▾</span></span>
                    </div>
                    <div class="county-agencies">${agencyHtml}</div>
                </div>`;
            }).join('');
            grid.querySelectorAll('input[data-county]').forEach(cb => {
                const items = groups[cb.dataset.county] || [];
                const sel = items.filter(([id]) => selectedAgencies.has(id)).length;
                cb.indeterminate = sel > 0 && sel < items.length;
            });
            document.getElementById('filter-count').textContent = selectedAgencies.size;
            document.getElementById('total-agencies').textContent = Object.keys(knownAgencies).length;
        }
        function toggleCounty(county) {
            const ids = Object.entries(knownAgencies)
                .filter(([, i]) => (i.county || 'Other') === county).map(([id]) => id);
            const allSel = ids.length > 0 && ids.every(id => selectedAgencies.has(id));
            ids.forEach(id => allSel ? selectedAgencies.delete(id) : selectedAgencies.add(id));
            saveState(); updateAgencyFilters(); renderIncidents();
        }
        function expandAllCounties() { expandedCounties = new Set(Object.keys(agenciesByCounty())); updateAgencyFilters(); }
        function collapseAllCounties() { expandedCounties.clear(); updateAgencyFilters(); }
        function toggleAgency(id) {
            if (selectedAgencies.has(id)) selectedAgencies.delete(id);
            else selectedAgencies.add(id);
            saveState(); updateAgencyFilters(); renderIncidents();
        }
        function selectAll() { selectedAgencies = new Set(Object.keys(knownAgencies)); saveState(); updateAgencyFilters(); renderIncidents(); }
        function selectNone() { selectedAgencies.clear(); saveState(); updateAgencyFilters(); renderIncidents(); }

        // ---- detail modal --------------------------------------------------------
        function initDetailMap(lat, lng, address) {
            const el = document.getElementById('detail-map');
            if (!el || typeof L === 'undefined') return;
            if (detailMap) { detailMap.remove(); detailMap = null; }
            const isMobile = !!(L.Browser && L.Browser.mobile);
            detailMap = L.map(el, { scrollWheelZoom: false, dragging: !isMobile, touchZoom: !isMobile, tap: false }).setView([lat, lng], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap contributors' }).addTo(detailMap);
            const marker = L.marker([lat, lng]).addTo(detailMap);
            if (address) marker.bindPopup(escapeHtml(address)).openPopup();
            setTimeout(() => { if (detailMap) detailMap.invalidateSize(); }, 80);
        }
        function showIncidentDetail(incidentId) {
            const incident = allIncidentsMap[incidentId];
            if (!incident) return;
            const callType = incident.call_type || 'UNK';
            const ctFull = callTypeFull(callType) || incident.call_type_description || callType;
            document.getElementById('modal-title').textContent = `${callType} - ${ctFull}`;
            const unitsHtml = (incident.units || []).map(u => {
                const statusFull = UNIT_STATUS_FULL[u.status_code] || u.status || u.status_code;
                return `<div class="detail-unit unit-badge unit-${u.status_color || 'gray'}">
                    <strong>${escapeHtml(u.unit_id)}</strong><div class="detail-unit-info">${escapeHtml(statusFull)}</div>
                </div>`;
            }).join('') || '<span style="color:#98a2b3">No units assigned</span>';
            const coords = parseCoords(incident);
            const addrText = escapeHtml(incident.address || 'Not available');
            const coordValue = coords
                ? `${coords.lat.toFixed(6)}, ${coords.lng.toFixed(6)}`
                : `${escapeHtml(incident.latitude || '-')}, ${escapeHtml(incident.longitude || '-')}`;
            const mapSection = coords ? `
                <div id="detail-map" class="detail-map"></div>
                <div class="map-actions">
                    <a class="map-link" href="${gmapsUrl(coords.lat, coords.lng)}" target="_blank" rel="noopener">Open in Google Maps</a>
                    <a class="map-link osm" href="${osmUrl(coords.lat, coords.lng)}" target="_blank" rel="noopener">Open in OpenStreetMap</a>
                </div>` : '';
            document.getElementById('modal-body').innerHTML = `
                <div class="detail-row"><span class="detail-label">STATUS</span>
                    <span class="detail-value"><span class="status-badge status-${incident._status || 'recent'}">${(incident._status || 'recent').toUpperCase()}</span></span></div>
                <div class="detail-row"><span class="detail-label">INCIDENT ID</span><span class="detail-value">${escapeHtml(incident.incident_id || '-')}</span></div>
                <div class="detail-row"><span class="detail-label">CALL TYPE</span>
                    <span class="detail-value"><span class="call-type ${getCallClass(callType)}">${escapeHtml(callType)}</span> ${escapeHtml(ctFull)}</span></div>
                <div class="detail-row"><span class="detail-label">AGENCY</span><span class="detail-value">${escapeHtml(incident.agency_name || incident.agency_id)}</span></div>
                <div class="detail-row"><span class="detail-label">ADDRESS</span><span class="detail-value">${addrText}</span></div>
                <div class="detail-row"><span class="detail-label">RECEIVED</span>
                    <span class="detail-value">${incident.received_time ? new Date(incident.received_time).toLocaleString() : '-'} (${timeAgo(incident.received_time)})</span></div>
                <div class="detail-row"><span class="detail-label">COORDINATES</span><span class="detail-value">${coordValue}</span></div>
                <div class="detail-row"><span class="detail-label">UNITS (${incident.unit_count || 0})</span><span class="detail-value"></span></div>
                <div class="detail-units">${unitsHtml}</div>
                ${mapSection}
            `;
            document.getElementById('modal-overlay').classList.add('show');
            if (coords) initDetailMap(coords.lat, coords.lng, incident.address || '');
        }
        function closeModal(event) {
            if (!event || event.target.id === 'modal-overlay') {
                document.getElementById('modal-overlay').classList.remove('show');
                if (detailMap) { detailMap.remove(); detailMap = null; }
            }
        }
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

        // ---- event delegation ----------------------------------------------------
        document.getElementById('incidents-body').addEventListener('click', (e) => {
            const tr = e.target.closest('tr[data-incident-id]');
            if (tr) showIncidentDetail(tr.dataset.incidentId);
        });
        const agencyGrid = document.getElementById('agency-grid');
        agencyGrid.addEventListener('change', (e) => {
            const ag = e.target.closest('input[data-agency-id]');
            if (ag) { toggleAgency(ag.dataset.agencyId); return; }
            const co = e.target.closest('input[data-county]');
            if (co) toggleCounty(co.dataset.county);
        });
        agencyGrid.addEventListener('click', (e) => {
            if (e.target.closest('input')) return;
            const header = e.target.closest('[data-county-toggle]');
            if (!header) return;
            const county = header.dataset.countyToggle;
            const group = header.closest('.county-group');
            if (expandedCounties.has(county)) { expandedCounties.delete(county); group.classList.add('collapsed'); }
            else { expandedCounties.add(county); group.classList.remove('collapsed'); }
        });

        // ---- full-board map ------------------------------------------------------
        let boardMap = null, boardLayer = null;
        const boardMarkers = new Map(); // incident_id -> { marker, status, type }

        function ensureBoardMap() {
            if (boardMap || typeof L === 'undefined') return boardMap;
            boardMap = L.map('board-map', { scrollWheelZoom: true }).setView([44.1, -120.7], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap contributors' }).addTo(boardMap);
            boardLayer = (typeof L.markerClusterGroup === 'function')
                ? L.markerClusterGroup({ maxClusterRadius: 45, chunkedLoading: true, spiderfyOnMaxZoom: true })
                : L.layerGroup();
            boardMap.addLayer(boardLayer);
            return boardMap;
        }
        function incIcon(cls, active) {
            return L.divIcon({ className: '', iconSize: [16, 16], iconAnchor: [8, 8],
                html: `<span class="inc-dot inc-${cls}${active ? ' inc-active' : ''}"></span>` });
        }
        function renderBoardMap(incidents) {
            if (boardView !== 'map') return;
            const note = document.getElementById('map-note');
            if (typeof L === 'undefined') { note.textContent = 'Map unavailable (offline). The table view still works.'; return; }
            ensureBoardMap();
            const desired = new Map();
            let notMapped = 0;
            incidents.forEach(i => {
                const c = parseCoords(i);
                if (!c) { notMapped++; return; }
                desired.set(i.incident_id, { i, c });
            });
            for (const [id, rec] of boardMarkers) {
                if (!desired.has(id)) { boardLayer.removeLayer(rec.marker); boardMarkers.delete(id); }
            }
            for (const [id, { i, c }] of desired) {
                const cls = getCallClass(i.call_type).replace('call-', '');
                const active = i._status === 'active';
                const existing = boardMarkers.get(id);
                if (!existing) {
                    const m = L.marker([c.lat, c.lng], { icon: incIcon(cls, active) });
                    m.on('click', () => showIncidentDetail(id));
                    m.bindTooltip(`${escapeHtml(CALL_TYPES_SHORT[i.call_type] || i.call_type || '')} · ${escapeHtml(i.agency_name || '')}`);
                    boardLayer.addLayer(m);
                    boardMarkers.set(id, { marker: m, status: i._status, type: cls });
                } else if (existing.status !== i._status || existing.type !== cls) {
                    existing.marker.setIcon(incIcon(cls, active));
                    existing.status = i._status; existing.type = cls;
                }
            }
            note.textContent = notMapped > 0 ? `${notMapped} incident(s) without coordinates are not shown on the map.` : '';
            setTimeout(() => { if (boardMap) boardMap.invalidateSize(); }, 60);
        }

        // ---- render --------------------------------------------------------------
        function filteredIncidents() {
            let incidents = [];
            if (currentView === 'all' || currentView === 'active')
                incidents = incidents.concat((allData.active_incidents || []).map(i => ({ ...i, _status: 'active' })));
            if (currentView === 'all' || currentView === 'recent')
                incidents = incidents.concat((allData.recent_incidents || []).map(i => ({ ...i, _status: 'recent' })));
            if (selectedAgencies.size > 0)
                incidents = incidents.filter(i => selectedAgencies.has(i.agency_id));
            incidents = incidents.filter(i => isWithinTimeRange(i.received_time));
            incidents.sort((a, b) => {
                if (a._status !== b._status) return a._status === 'active' ? -1 : 1;
                let va, vb;
                switch (sortField) {
                    case 'status': va = a._status; vb = b._status; break;
                    case 'type': va = a.call_type || ''; vb = b.call_type || ''; break;
                    case 'agency': va = a.agency_name || ''; vb = b.agency_name || ''; break;
                    case 'address': va = a.address || ''; vb = b.address || ''; break;
                    case 'time': default: va = a.received_time || ''; vb = b.received_time || '';
                }
                if (va < vb) return sortAsc ? -1 : 1;
                if (va > vb) return sortAsc ? 1 : -1;
                return 0;
            });
            return incidents;
        }

        function renderIncidents() {
            updateSortIndicators();
            const incidents = filteredIncidents();
            const tbody = document.getElementById('incidents-body');
            const noInc = document.getElementById('no-incidents');
            const scrollY = window.scrollY;

            if (incidents.length === 0) {
                tbody.innerHTML = '';
                noInc.style.display = boardView === 'table' ? 'block' : 'none';
            } else {
                noInc.style.display = 'none';
                incidents.forEach(i => { allIncidentsMap[i.incident_id] = i; });
                tbody.innerHTML = incidents.map(i => {
                    const units = (i.units || []).map(u =>
                        `<span class="unit-badge unit-${u.status_color || 'gray'}">${escapeHtml(u.unit_id)}</span>`
                    ).join('');
                    const coords = parseCoords(i);
                    const addrText = escapeHtml(i.address || '-');
                    const addrCell = coords
                        ? `<span class="addr-link" title="Click row for details + map">${addrText}<span class="pin">📍</span></span>`
                        : addrText;
                    const ctFull = callTypeFull(i.call_type) || i.call_type_description || '';
                    const isNew = newIncidentIds.has(i.incident_id) ? ' is-new' : '';
                    return `<tr class="${i._status}${isNew}" data-incident-id="${escapeHtml(i.incident_id)}" title="Click for details">
                        <td data-label="STATUS"><span class="status-badge status-${i._status}">${i._status.toUpperCase()}</span></td>
                        <td data-label="TIME" class="time-cell">${formatTime(i.received_time)} <span class="time-ago">${timeAgo(i.received_time)}</span></td>
                        <td data-label="TYPE"><span class="call-type ${getCallClass(i.call_type)}" title="${escapeHtml(ctFull)}">${escapeHtml(CALL_TYPES_SHORT[i.call_type] || i.call_type)}</span></td>
                        <td data-label="AGENCY">${escapeHtml(i.agency_name || i.agency_id)}</td>
                        <td data-label="ADDRESS">${addrCell}</td>
                        <td data-label="UNITS" class="units-cell">${units || '-'}</td>
                    </tr>`;
                }).join('');
                if (window.scrollY !== scrollY) window.scrollTo(0, scrollY);
            }

            // stat counters (reflect the current filter, not just active)
            const activeFiltered = (allData.active_incidents || []).filter(i => selectedAgencies.size === 0 || selectedAgencies.has(i.agency_id));
            const recentFiltered = (allData.recent_incidents || []).filter(i => selectedAgencies.size === 0 || selectedAgencies.has(i.agency_id));
            document.getElementById('active-count').textContent = activeFiltered.length;
            document.getElementById('recent-count').textContent = recentFiltered.length;
            const unitSet = new Set();
            incidents.forEach(i => (i.units || []).forEach(u => unitSet.add(i.agency_id + ':' + u.unit_id)));
            document.getElementById('unit-count').textContent = unitSet.size;
            const agencyCount = selectedAgencies.size > 0 ? selectedAgencies.size : Object.keys(knownAgencies).length;
            document.getElementById('agency-count').textContent = agencyCount;

            renderBoardMap(incidents);
        }

        function updateLiveStatus() {
            const el = document.getElementById('refresh-status');
            const dot = document.querySelector('.live-dot');
            if (lastFetchOk === false) { el.textContent = 'OFFLINE'; dot.className = 'live-dot error'; return; }
            if (!allData.last_updated) { el.textContent = 'LIVE'; dot.className = 'live-dot'; return; }
            const ageMin = Math.floor((Date.now() - new Date(allData.last_updated)) / 60000);
            if (ageMin >= STALE_MINUTES) { el.textContent = `STALE ${ageMin}m`; dot.className = 'live-dot stale'; }
            else { el.textContent = 'LIVE'; dot.className = 'live-dot'; }
        }

        async function fetchData() {
            try {
                const response = await fetch(DATA_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('Failed to fetch');
                allData = await response.json();
                lastFetchOk = true;

                const agencies = allData.agencies || {};
                const activeByAgency = {}, recentByAgency = {};
                (allData.active_incidents || []).forEach(i => { activeByAgency[i.agency_id] = (activeByAgency[i.agency_id] || 0) + 1; });
                (allData.recent_incidents || []).forEach(i => { recentByAgency[i.agency_id] = (recentByAgency[i.agency_id] || 0) + 1; });
                Object.entries(agencies).forEach(([id, info]) => {
                    if (!knownAgencies[id]) knownAgencies[id] = { name: info.name || `Agency ${id}`, activeCount: 0, recentCount: 0 };
                    knownAgencies[id].name = info.name || knownAgencies[id].name;
                    knownAgencies[id].county = info.region || knownAgencies[id].county || 'Other';
                    knownAgencies[id].activeCount = activeByAgency[id] || 0;
                    knownAgencies[id].recentCount = recentByAgency[id] || 0;
                });

                // one-time agency-selection init: URL ?ag= > localStorage > all
                if (!agenciesInitialized && Object.keys(knownAgencies).length > 0) {
                    const urlAg = new URLSearchParams(location.search).get('ag');
                    if (urlAg) {
                        selectedAgencies = new Set(urlAg.split(',').filter(id => knownAgencies[id]));
                    } else {
                        try {
                            const saved = JSON.parse(localStorage.getItem('orfireems_agencies') || '[]');
                            selectedAgencies = new Set(saved.filter(id => knownAgencies[id]));
                        } catch (e) {}
                    }
                    if (selectedAgencies.size === 0) selectedAgencies = new Set(Object.keys(knownAgencies));
                    agenciesInitialized = true;
                }

                // detect incidents new since the previous fetch
                const curIds = new Set([...(allData.active_incidents || []), ...(allData.recent_incidents || [])].map(i => i.incident_id));
                newIncidentIds = prevAllIds ? new Set([...curIds].filter(id => !prevAllIds.has(id))) : new Set();
                prevAllIds = curIds;

                updateAgencyFilters();
                renderIncidents();
                document.getElementById('last-update').textContent = allData.last_updated
                    ? `Last updated: ${new Date(allData.last_updated).toLocaleString()}` : 'Loading...';
                updateLiveStatus();
            } catch (error) {
                console.error('Fetch error:', error);
                lastFetchOk = false;
                updateLiveStatus();
            }
        }
    </script>
</body>
</html>
