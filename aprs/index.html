<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>KJ7DTS APRS · Holden Portal</title>
<meta name="description" content="Live APRS iGate range tracker and weather for KJ7DTS, Powell Butte OR.">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{--bg:#0d1117;--card:#161b22;--ln:#30363d;--tx:#c9d1d9;--dim:#8b949e;--ok:#3fb950;--blue:#58a6ff;--dx:#bc8cff}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--tx);font-family:system-ui,Segoe UI,Roboto,sans-serif}
header{padding:12px 18px;background:var(--card);border-bottom:1px solid var(--ln);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
header h1{font-size:17px;margin:0}header .sub{color:var(--dim);font-size:12px}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
.wrap{padding:14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--ln);border-radius:10px;padding:12px 14px}
.card .lbl{color:var(--dim);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
.card .big{font-size:24px;font-weight:700;margin-top:4px}.card .sm{color:var(--dim);font-size:12px;margin-top:2px}
.row2{padding:0 14px 14px;display:grid;grid-template-columns:1.3fr 1fr;gap:12px}
@media(max-width:880px){.row2{grid-template-columns:1fr}}
#map{height:440px;border-radius:10px;border:1px solid var(--ln)}
.range .hero{display:flex;align-items:baseline;gap:10px}.range .hero .n{font-size:34px;font-weight:800;color:var(--dx)}
.rings{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.ring{flex:1;min-width:62px;text-align:center;background:#1b2230;border:1px solid var(--ln);border-radius:8px;padding:8px 4px}
.ring .c{font-size:20px;font-weight:700}.ring .t{font-size:11px;color:var(--dim)}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--ln);white-space:nowrap}
th{color:var(--dim);font-weight:600;font-size:11px;text-transform:uppercase}
td.call{font-weight:600;color:var(--blue)}td.cmt{white-space:normal;color:var(--dim);max-width:150px}
.badge{font-size:11px;padding:1px 7px;border-radius:10px;font-weight:600}
.empty{padding:20px;color:var(--dim);text-align:center;line-height:1.6}
.links{padding:0 18px 26px;font-size:13px;display:flex;gap:18px;flex-wrap:wrap}
.foot{padding:0 18px 24px;color:var(--dim);font-size:12px}
</style></head><body>
<header>
  <div><h1>📡 KJ7DTS APRS — Powell Butte, OR</h1>
       <div class="sub">Live receive iGate range tracker + weather · updates every ~45s</div></div>
  <div class="sub"><a href="/">&larr; Holden Portal</a></div>
</header>

<div class="wrap" id="cards"></div>

<div class="row2">
  <div class="card"><div id="map"></div></div>
  <div class="card range">
    <div class="lbl">📡 Farthest station heard directly</div>
    <div class="hero"><span class="n" id="dxmi">—</span><span id="dxcall" class="sub"></span></div>
    <div class="rings" id="rings"></div>
    <div id="tbl"></div>
  </div>
</div>

<div class="links" id="links"></div>
<div class="foot" id="foot">connecting…</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyArDL_Cd-xDlmA_92xiaDKXXrSLHPbFUNU",
  authDomain: "holden-portal.firebaseapp.com",
  databaseURL: "https://holden-portal-default-rtdb.firebaseio.com",
  projectId: "holden-portal"
};
firebase.initializeApp(firebaseConfig);

const RINGCOL = c => c<=10?'#3fb950':c<=20?'#9acd32':c<=30?'#d29922':c<=50?'#f0883e':'#bc8cff';
const map = L.map('map'); let homeM=null, ringLayers=[], markers={}, centered=false;
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);
function ago(iso){if(!iso)return'—';let t=Date.parse(iso);if(isNaN(t))return iso;let s=Math.max(0,(Date.now()-t)/1000);
 return s<60?Math.round(s)+'s':s<3600?Math.round(s/60)+'m':s<86400?Math.round(s/3600)+'h':Math.round(s/86400)+'d';}
function dot(col,r){return L.divIcon({className:'',html:'<div style="width:'+(r||12)+'px;height:'+(r||12)+'px;border-radius:50%;background:'+col+';border:2px solid #fff;box-shadow:0 0 4px #000"></div>',iconSize:[r||12,r||12],iconAnchor:[(r||12)/2,(r||12)/2]});}
function card(l,b,s){return '<div class="card"><div class="lbl">'+l+'</div><div class="big">'+b+'</div><div class="sm">'+(s||'')+'</div></div>';}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function render(d){
  if(!d||!d.aprs){document.getElementById('foot').textContent='waiting for data…';return;}
  const ap=d.aprs, wx=d.wx||{};
  let c='';
  c+=card('📡 Heard directly', ap.unique||0, (ap.total_packets||0)+' packets');
  c+=card('🏆 Farthest', ap.farthest? ap.farthest.dist_mi+' mi':'—', ap.farthest? ap.farthest.call:'—');
  if(wx&&wx.ok!==false&&wx.temp_f!=null){
    c+=card('🌡️ Weather', wx.temp_f+'°F', 'RH '+(wx.humidity_pct??'—')+'% · wind '+(wx.wind_mph??'—')+' mph @ '+(wx.wind_dir_deg??'—')+'°');
  }
  document.getElementById('cards').innerHTML=c;

  document.getElementById('dxmi').textContent = ap.farthest? ap.farthest.dist_mi+' mi':'—';
  document.getElementById('dxcall').textContent = ap.farthest? (ap.farthest.call+' @ '+ap.farthest.bearing+'° · '+ago(ap.farthest.isotime)+' ago'):'nothing heard yet';

  const edges=ap.ring_edges||[10,20,30,50], rg=ap.rings||{}; let rh='',prev=0;
  edges.forEach(e=>{rh+='<div class="ring" style="border-color:'+RINGCOL(e)+'"><div class="c">'+(rg['le'+e]||0)+'</div><div class="t">'+prev+'–'+e+' mi</div></div>';prev=e;});
  rh+='<div class="ring" style="border-color:'+RINGCOL(999)+'"><div class="c">'+(rg['gt'+edges[edges.length-1]]||0)+'</div><div class="t">&gt;'+edges[edges.length-1]+' mi 🏆</div></div>';
  document.getElementById('rings').innerHTML=rh;

  if(ap.home&&!centered){map.setView([ap.home.lat,ap.home.lon],9);centered=true;}
  if(ap.home&&!homeM){homeM=L.marker([ap.home.lat,ap.home.lon],{icon:dot('#f0883e',14),zIndexOffset:1000}).addTo(map).bindPopup('🏠 '+ap.home.igate);}
  if(ap.home&&!ringLayers.length){edges.forEach(e=>{ringLayers.push(L.circle([ap.home.lat,ap.home.lon],{radius:e*1609.34,color:RINGCOL(e),weight:1,fill:false,dashArray:'4 5',opacity:.5}).addTo(map));});}
  const seen={};(ap.stations||[]).forEach(s=>{if(s.lat==null||s.lon==null)return;seen[s.call]=1;
    const col=RINGCOL(s.dist_mi),pop='<b>'+esc(s.call)+'</b> · '+s.dist_mi+' mi @ '+s.bearing+'°<br>'+esc(s.comment||'')+'<br><small>'+s.count+' pkt · '+ago(s.isotime)+' ago</small>';
    if(markers[s.call])markers[s.call].setLatLng([s.lat,s.lon]).setPopupContent(pop).setIcon(dot(col,11));
    else markers[s.call]=L.marker([s.lat,s.lon],{icon:dot(col,11)}).addTo(map).bindPopup(pop);});
  Object.keys(markers).forEach(k=>{if(!seen[k]){map.removeLayer(markers[k]);delete markers[k];}});

  let t='';
  if(!(ap.stations||[]).length){t='<div class="empty">🎧 Listening on 144.390 MHz…<br>No stations decoded recently.</div>';}
  else{t='<table><thead><tr><th>Call</th><th>Dist</th><th>Brg</th><th>Heard</th><th>Pkts</th><th>Comment</th></tr></thead><tbody>';
    ap.stations.forEach(s=>{const dm=s.dist_mi,badge=dm!=null?'<span class="badge" style="background:'+RINGCOL(dm)+'22;color:'+RINGCOL(dm)+'">'+dm+' mi</span>':'—';
      t+='<tr><td class="call">'+esc(s.call)+'</td><td>'+badge+'</td><td>'+(s.bearing!=null?s.bearing+'°':'—')+'</td><td>'+ago(s.isotime)+'</td><td>'+s.count+'</td><td class="cmt">'+esc(s.comment||'')+'</td></tr>';});
    t+='</tbody></table>';}
  document.getElementById('tbl').innerHTML=t;

  document.getElementById('links').innerHTML=
    '<a href="https://aprs.fi/#!call=a%2F'+(ap.home?ap.home.igate:'KJ7DTS-10')+'" target="_blank" rel="noopener">📍 iGate on aprs.fi</a>'+
    '<a href="https://aprs.fi/#!call=a%2F'+(ap.home&&ap.home.wx?ap.home.wx:'KJ7DTS-13')+'" target="_blank" rel="noopener">🌡️ Weather on aprs.fi</a>';
  document.getElementById('foot').textContent='Updated '+new Date().toLocaleTimeString()+' · data refreshes ~every 45s from the KJ7DTS home server.';
}

firebase.database().ref('aprs/status').on('value', s => { try{ render(s.val()); }catch(e){} },
  () => { document.getElementById('foot').textContent='could not load data'; });
</script></body></html>
