<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holden Portal</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.1));
        }

        .login-box {
            background-color: #1e293b;
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid rgba(99, 102, 241, 0.2);
            max-width: 380px;
            width: 100%;
            margin: 1rem;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 0.5rem;
            font-size: 2rem;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .login-box p {
            text-align: center;
            color: #64748b;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            color: #94a3b8;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid rgba(99, 102, 241, 0.25);
            border-radius: 6px;
            background-color: #0f172a;
            color: #f1f5f9;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #6366f1;
        }

        .login-btn {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .error-message {
            color: #f87171;
            text-align: center;
            margin-bottom: 1rem;
            display: none;
            padding: 0.6rem;
            background-color: rgba(248, 113, 113, 0.08);
            border-radius: 5px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">Holden Portal</div>
            <p>Enter the password to continue</p>
            <div class="error-message" id="errorMessage">Incorrect password</div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autofocus>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>
        </div>
    </div>

    <script>
        // Change this password to whatever you want to share with family/friends
        var PORTAL_PASSWORD = 'HoldenPortal';

        // Already logged in — go home
        if (localStorage.getItem('portal_auth') === 'true') {
            window.location.replace('/');
        }

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            var input = document.getElementById('password').value;
            if (input === PORTAL_PASSWORD) {
                localStorage.setItem('portal_auth', 'true');
                var dest = new URLSearchParams(window.location.search).get('next') || '/';
                window.location.replace(dest);
            } else {
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });
    </script>
</body>
</html>
