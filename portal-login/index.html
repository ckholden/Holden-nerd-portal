<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holden Portal</title>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.1));
        }

        .login-box {
            background-color: #1e293b;
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid rgba(99, 102, 241, 0.2);
            max-width: 380px;
            width: 100%;
            margin: 1rem;
            text-align: center;
        }

        .login-logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.4rem;
        }

        .login-subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.8rem 1.5rem;
            background: #fff;
            color: #1f2937;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .google-btn:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            transform: translateY(-1px);
        }

        .google-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .google-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .error-message {
            margin-top: 1.25rem;
            padding: 0.7rem 1rem;
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.25);
            border-radius: 6px;
            color: #f87171;
            font-size: 0.875rem;
            display: none;
        }

        .status-message {
            margin-top: 1.25rem;
            color: #64748b;
            font-size: 0.85rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">Holden Portal</div>
            <div class="login-subtitle">Sign in to continue</div>

            <button class="google-btn" id="googleBtn">
                <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </button>

            <div class="error-message" id="errorMessage"></div>
            <div class="status-message" id="statusMessage">Signing in...</div>
        </div>
    </div>

    <script>
        var FIREBASE_CONFIG = {
            apiKey: "AIzaSyArDL_Cd-xDlmA_92xiaDKXXrSLHPbFUNU",
            authDomain: "holden-portal.firebaseapp.com",
            projectId: "holden-portal",
            storageBucket: "holden-portal.firebasestorage.app",
            messagingSenderId: "659387054117",
            appId: "1:659387054117:web:cf420bfd3a348e5aa6a7cc"
        };

        var ALLOWED_EMAILS = [
            'christiankholden@gmail.com'
            // Mirror this list from portal-auth.js
            // 'someone@gmail.com',
        ];

        firebase.initializeApp(FIREBASE_CONFIG);

        var dest = new URLSearchParams(window.location.search).get('next') || '/';

        // If already signed in and authorized, go straight through
        firebase.auth().onAuthStateChanged(function (user) {
            if (user && ALLOWED_EMAILS.indexOf(user.email.toLowerCase()) !== -1) {
                window.location.replace(dest);
            } else if (user) {
                // Signed in but not on the list
                firebase.auth().signOut();
                showError("Your Google account (" + user.email + ") is not authorized. Contact Christian to request access.");
            }
        });

        document.getElementById('googleBtn').addEventListener('click', function () {
            var btn = this;
            btn.disabled = true;
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('statusMessage').style.display = 'block';

            var provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider)
                .catch(function (error) {
                    btn.disabled = false;
                    document.getElementById('statusMessage').style.display = 'none';
                    if (error.code !== 'auth/popup-closed-by-user') {
                        showError('Sign-in failed: ' + error.message);
                    }
                });
        });

        function showError(msg) {
            var el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
